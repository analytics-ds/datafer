# Worker dédié au traitement asynchrone des briefs Datafer.
# Consomme la queue `datafer-analysis` et lance completeBriefAnalysis pour
# chaque message. Voir src/worker-analysis/index.ts pour la logique.
#
# Déploiement : `npx wrangler deploy --config wrangler-analysis.toml`

name = "datafer-analysis-consumer"
compatibility_date = "2026-04-14"
compatibility_flags = ["nodejs_compat"]
main = "src/worker-analysis/index.ts"

# Workers Paid plan activé : on peut configurer cpu_ms jusqu'à 300000
# (5 min). On met le maximum pour les analyses lourdes (NLP + embeddings
# bge-m3 sur 300 paragraphes pour le centroïde sémantique iter 8) sur
# les KW concurrentiels (sites JS-heavy, finance, e-commerce). Le wall
# time reste borné côté code par ANALYSIS_DEADLINE_MS (briefs-service.ts)
# et HEARTBEAT_STALE_MS (cleanup-stuck.ts).
[limits]
cpu_ms = 300000

[[d1_databases]]
binding = "DB"
database_name = "datafer"
database_id = "52061f81-b4f5-4b32-9685-a015b0981a29"

[ai]
binding = "AI"

[[queues.consumers]]
queue = "datafer-analysis"
# 1 brief à la fois DANS un worker : chaque analyse prend 30-60s CPU + 60-90s
# wall, on ne veut pas paralléliser dans le même worker (sinon retour au
# problème de budget Cloudflare).
max_batch_size = 1
max_batch_timeout = 5
# max_concurrency = 3 : CF peut faire tourner jusqu'à 3 invocations du
# consumer EN PARALLÈLE (3 analyses simultanées max), chacune dans son
# propre worker avec son propre budget CPU 5 min. Sans risque sur Workers
# Paid. Évite que le 5e brief d'un batch attende la fin des 4 autres.
max_concurrency = 3
# max_retries=1 : si l'analyse plante, on retry UNE fois puis DLQ. Plus de
# retries = on laisse le brief en pending visiblement plus longtemps côté
# user, alors qu'il faut vite faillir et laisser le cron cleanup ramasser.
max_retries = 1
dead_letter_queue = "datafer-analysis-dlq"

[vars]
SERP_PROVIDER = "crazyserp"

# Cron natif Cloudflare : tourne toutes les minutes pour purger les briefs
# `pending` au-delà de 2 min. Remplace le cron GH Actions trop flaky
# (latence reelle ~50-60min). GH Actions est gardé en backup mais Cloudflare
# Cron Triggers est désormais la source primaire du cleanup.
[triggers]
crons = ["* * * * *"]

# Secrets à set via :
#   wrangler secret put <NAME> --config wrangler-analysis.toml
#
# Liste à recopier depuis le worker datafer principal :
# - CRAZYSERP_KEY
# - CRAZYSERP_KEY_FALLBACK
# - SERPAPI_KEY
# - HALOSCAN_KEY
# - BRIGHTDATA_TOKEN
# - BRIGHTDATA_ZONE
