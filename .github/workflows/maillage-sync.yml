name: Maillage interne sync

on:
  # Feature maillage interne mise de côté 2026-05-26 : cron désactivé pour
  # ne plus enqueue de sync et donc ne plus consommer Bright Data en
  # background. Garde workflow_dispatch pour relancer manuellement si on
  # réactive le projet.
  # schedule:
  #   - cron: "17 * * * *"
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: maillage-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/cron/maillage-sync
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response=$(curl -sS -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://datafer.analytics-e0d.workers.dev/api/cron/maillage-sync)
          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1)
          echo "HTTP $status"
          echo "$body"
          if [ "$status" != "200" ]; then
            echo "::error::maillage-sync endpoint returned non-200"
            exit 1
          fi
