name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Apply D1 migrations (remote)
        run: npx wrangler d1 migrations apply datafer --remote

      - name: Generate Cloudflare types (cloudflare-env.d.ts)
        run: npm run cf-typegen

      - name: Deploy main worker (Next.js via OpenNext)
        run: npm run deploy

      - name: Deploy analysis consumer worker
        run: npx wrangler deploy --config wrangler-analysis.toml
